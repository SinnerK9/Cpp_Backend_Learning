<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的Web服务器</title>
    <style>
        body {
            background-color: #f0f0f0;
            text-align: center;
            padding-top: 50px;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #e74c3c;
            font-weight: bold;
            font-size: 20px;
        }
        p {
            color: #34495e;
            font-size: 18px;
        }
        .image-container {
            margin-top: 30px;
            padding: 15px;
            background: white;
            display: inline-block;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        img {
            max-width: 400px;
            border-radius: 8px;
        }
        .tip {
            margin-top: 40px;
            padding: 15px;
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            border-radius: 8px;
            display: inline-block;
            text-align: left;
        }
    </style>
</head>
<body>
    <h1>恭喜！Web 服务器终极进化 🎉</h1>
    <p class="subtitle">mmap + writev + 状态机解析 + 线程池</p>
    <p>你的 epoll 服务器不仅能分发网页，还能无缝处理多媒体资源了！</p>
    
    <!-- 增加一张图片的请求，用来触发长连接并发 -->
    <div class="image-container">
        <p style="margin-top: 0; color: #7f8c8d; font-size: 14px;">下面这张图片是通过同一个 TCP 连接拉取的 👇</p>
        <img src="/test.jpg" alt="测试图片">
    </div>

    <!-- 这是新增的通道：把用户引向登录页面 -->
    <div style="margin-top: 40px;">
        <p>想体验和 MySQL 数据库的动态交互吗？</p>
        <a href="/login.html" style="
            display: inline-block;
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 18px;
        ">👉 点击这里进入登录测试页</a>
    </div>
</body>
</html>
