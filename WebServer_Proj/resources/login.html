<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统登录</title>
    <style>
        body {
            background-color: #2c3e50;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            width: 300px;
            text-align: center;
        }
        h2 { margin: 0 0 30px; color: #333; }
        .input-group { margin-bottom: 20px; text-align: left;}
        .input-group label { display: block; margin-bottom: 5px; color: #666; }
        .input-group input {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 5px; box-sizing: border-box;
        }
        .btn {
            width: 100%; padding: 10px; border: none;
            background-color: #3498db; color: white;
            font-size: 16px; border-radius: 5px; cursor: pointer;
        }
        .btn:hover { background-color: #2980b9; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>欢迎登录</h2>
        
        <!-- 🔴 这里的核心魔法：form 表单 -->
        <!-- action="/login" 意味着点击按钮后，向 http://.../login 发请求 -->
        <!-- method="post" 意味着这是一个 POST 请求 -->
        <form action="/login" method="post">
            
            <div class="input-group">
                <label>账号</label>
                <!-- name="user" 决定了发给 C++ 的字符串是 user=输入的内容 -->
                <input type="text" name="user" required placeholder="请输入 admin">
            </div>
            
            <div class="input-group">
                <label>密码</label>
                <!-- name="password" 决定了字符串后半段是 &password=输入的内容 -->
                <input type="password" name="password" required placeholder="请输入 123456">
            </div>
            
            <button type="submit" class="btn">登 录</button>
            
        </form>

    </div>
</body>
</html>
